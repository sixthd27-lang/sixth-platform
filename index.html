<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#07090f"/>
<meta name="description" content="منصة السادس التعليمية — الأولى في العراق"/>
<title>منصة السادس التعليمية</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>
<style>
/* ══════════ Variables ══════════ */
:root{
  --bg:#07090f;--s1:#0d1117;--s2:#111827;--card:#131c2e;--card2:#172035;
  --b1:#1a2640;--b2:#1e2d4e;
  --p:#7c3aed;--p2:#9b59ff;--p3:#6d28d9;
  --blue:#2563eb;--blue2:#4f7cff;
  --cyan:#06b6d4;--green:#10b981;
  --gold:#fbbf24;--orange:#f59e0b;--red:#ef4444;
  --text:#dde8ff;--t2:#6b87b0;--t3:#3d5a7a;
  --gp:rgba(124,58,237,.18);--gb:rgba(37,99,235,.12);
  --r:16px;--r2:12px;--r3:8px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);
  color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;
  -webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--b1);border-radius:2px}

/* ══════════ Animations ══════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes slideR{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:none}}
@keyframes pulse2{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.92)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(124,58,237,.25)}
                50%{box-shadow:0 0 40px rgba(124,58,237,.55)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes countUp{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes borderGlow{0%,100%{border-color:rgba(124,58,237,.3)}
                      50%{border-color:rgba(124,58,237,.8)}}

.au{animation:fadeUp .3s ease forwards}
.as{animation:slideR .25s ease forwards}

/* ══════════ Layout ══════════ */
#root{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding:16px 16px 76px;
  opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;
  transform:translateY(8px)}
.page.active{opacity:1;pointer-events:auto;transform:none}

/* ══════════ Card ══════════ */
.card{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);
  padding:15px;margin-bottom:10px;transition:border-color .2s}
.card:active{transform:scale(.985)}
.card.glow{animation:borderGlow 3s infinite;box-shadow:0 4px 30px rgba(124,58,237,.12)}

/* ══════════ Glass ══════════ */
.glass{background:rgba(13,17,23,.75);backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);border:1px solid var(--b1)}

/* ══════════ Skeleton ══════════ */
.sk{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);
  background-size:200%;animation:shimmer 1.4s infinite;border-radius:var(--r3)}
.sk-h{height:18px;margin-bottom:8px}
.sk-lg{height:60px}.sk-sm{height:10px;width:55%}

/* ══════════ Neon Heading ══════════ */
.neon-title{
  background:linear-gradient(135deg,var(--p2),var(--blue2),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  font-weight:900;
}

/* ══════════ Progress ══════════ */
.prog{background:rgba(255,255,255,.05);border-radius:20px;overflow:hidden}
.prog-fill{height:100%;border-radius:20px;
  background:linear-gradient(90deg,var(--p),var(--blue2),var(--cyan));
  transition:width 1s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 12px rgba(124,58,237,.4)}

/* ══════════ Stat ══════════ */
.stats3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);
  padding:11px 6px;text-align:center}
.stat-v{font-size:18px;font-weight:900;
  background:linear-gradient(135deg,var(--p2),var(--blue2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-k{font-size:9px;color:var(--t2);margin-top:2px;font-weight:600}

/* ══════════ Buttons ══════════ */
.btn{width:100%;padding:13px;border:none;border-radius:var(--r2);
  font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:all .18s;display:flex;align-items:center;
  justify-content:center;gap:8px}
.btn-p{background:linear-gradient(135deg,var(--p),var(--blue));color:#fff;
  box-shadow:0 4px 24px rgba(124,58,237,.3)}
.btn-p:active{transform:scale(.97);box-shadow:none}
.btn-outline{background:transparent;border:1px solid var(--b2);color:var(--text)}
.btn-danger{background:linear-gradient(135deg,var(--red),#c0392b);color:#fff}
.btn-sm{width:auto;padding:7px 14px;font-size:11px}

/* ══════════ Input ══════════ */
.input{width:100%;padding:12px 14px;background:var(--s2);
  border:1px solid var(--b1);border-radius:var(--r2);
  color:var(--text);font-family:'Cairo',sans-serif;font-size:13px;
  outline:none;transition:border-color .2s,box-shadow .2s}
.input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(124,58,237,.15)}
textarea.input{resize:none;height:80px}
select.input{appearance:none}
.form-group{margin-bottom:12px}
.form-label{font-size:11px;color:var(--t2);font-weight:700;margin-bottom:5px;display:block}

/* ══════════ Hero Banner ══════════ */
.hero{border-radius:var(--r);padding:20px;margin-bottom:12px;
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(37,99,235,.12),rgba(6,182,212,.08));
  border:1px solid rgba(124,58,237,.22)}
.hero::before{content:'';position:absolute;top:-30px;right:-20px;
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,rgba(124,58,237,.22),transparent)}
.hero::after{content:'';position:absolute;bottom:-20px;left:-20px;
  width:80px;height:80px;border-radius:50%;
  background:radial-gradient(circle,rgba(6,182,212,.18),transparent)}

/* ══════════ Subject Grid ══════════ */
.subj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.subj-card{border-radius:var(--r);padding:18px 14px;text-align:center;
  cursor:pointer;border:1px solid var(--b1);transition:all .18s;
  background:var(--card)}
.subj-card:active{transform:scale(.95)}
.subj-icon{font-size:30px;margin-bottom:8px}
.subj-name{font-size:12px;font-weight:700;line-height:1.3}
.subj-cnt{font-size:10px;color:var(--t2);margin-top:4px}

/* ══════════ Content Item ══════════ */
.ci{display:flex;align-items:center;gap:10px;padding:13px;
  background:var(--card);border:1px solid var(--b1);
  border-radius:var(--r2);margin-bottom:8px;cursor:pointer;
  transition:border-color .2s,background .15s}
.ci:active{background:var(--card2)}
.ci:hover{border-color:var(--b2)}
.ci-ico{width:40px;height:40px;border-radius:11px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:19px}
.ci-body{flex:1;min-width:0}
.ci-title{font-size:13px;font-weight:700;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.ci-sub{font-size:10px;color:var(--t2);margin-top:2px}
.ci-badge{font-size:9px;font-weight:700;border-radius:6px;padding:2px 8px;
  background:rgba(124,58,237,.12);color:var(--p2);border:1px solid rgba(124,58,237,.18);
  flex-shrink:0}

/* ══════════ Exam Card ══════════ */
.exam-card{background:linear-gradient(135deg,var(--card),rgba(37,99,235,.06));
  border:1px solid rgba(37,99,235,.2);border-radius:var(--r);
  padding:16px;margin-bottom:10px}
.exam-card.active-exam{border-color:rgba(124,58,237,.35);
  animation:borderGlow 3s infinite}
.timer{font-size:24px;font-weight:900;font-variant-numeric:tabular-nums;
  letter-spacing:1px;min-width:72px;text-align:center}
.timer.ok{color:var(--green)}
.timer.warn{color:var(--orange)}
.timer.crit{color:var(--red);animation:pulse2 1s infinite}

/* ══════════ Leaderboard ══════════ */
.lb{display:flex;align-items:center;gap:10px;padding:13px;
  background:var(--card);border:1px solid var(--b1);
  border-radius:var(--r2);margin-bottom:8px}
.lb.gold{background:linear-gradient(135deg,rgba(251,191,36,.07),transparent);
         border-color:rgba(251,191,36,.2);animation:glow 3s infinite}
.lb.silver{border-color:rgba(192,192,192,.15)}
.lb.bronze{border-color:rgba(205,127,50,.15)}
.lb-rank{width:30px;font-size:17px;font-weight:900;text-align:center;flex-shrink:0}
.lb-av{width:42px;height:42px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:23px}
.lb-xp{font-size:13px;font-weight:900;
  background:linear-gradient(135deg,var(--gold),var(--orange));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* ══════════ Profile ══════════ */
.prof-hero{border-radius:var(--r);padding:22px;margin-bottom:12px;text-align:center;
  background:linear-gradient(135deg,rgba(124,58,237,.16),rgba(37,99,235,.1));
  border:1px solid rgba(124,58,237,.2)}
.prof-av{width:76px;height:76px;border-radius:22px;margin:0 auto 12px;
  display:flex;align-items:center;justify-content:center;font-size:36px;
  animation:float 3s ease-in-out infinite;
  box-shadow:0 0 30px rgba(124,58,237,.35)}

/* ══════════ Notification Badge ══════════ */
.nb{position:absolute;top:3px;right:2px;width:8px;height:8px;
  border-radius:50%;background:var(--red);animation:pulse2 2s infinite}

/* ══════════ Section Title ══════════ */
.sec{font-size:10px;font-weight:800;color:var(--t2);
  text-transform:uppercase;letter-spacing:.6px;margin:14px 0 8px}

/* ══════════ Nav ══════════ */
.nav{height:64px;background:var(--s1);border-top:1px solid var(--b1);
  display:flex;align-items:center;padding:0 4px;z-index:10;
  position:relative}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;padding:8px 4px;border-radius:10px;transition:background .15s;
  position:relative}
.nav-item:active{background:rgba(124,58,237,.1)}
.nav-icon{font-size:21px;transition:transform .2s}
.nav-label{font-size:9px;color:var(--t2);font-weight:700;transition:color .2s}
.nav-item.active .nav-icon{transform:scale(1.2)}
.nav-item.active .nav-label{color:var(--p2)}

/* ══════════ Back bar ══════════ */
.back{display:flex;align-items:center;gap:8px;padding:8px 0 14px;
  cursor:pointer;opacity:.8;transition:opacity .15s}
.back:active{opacity:.5}

/* ══════════ Toast ══════════ */
.toast-wrap{position:fixed;top:16px;left:50%;
  transform:translateX(-50%) translateY(-80px);
  transition:transform .25s;z-index:9999;pointer-events:none;max-width:88vw}
.toast-wrap.show{transform:translateX(-50%) translateY(0)}
.toast-box{background:var(--card2);border:1px solid var(--b2);
  border-radius:10px;padding:10px 18px;font-size:12px;font-weight:700;
  box-shadow:0 8px 30px rgba(0,0,0,.5);text-align:center}
.toast-s{border-color:var(--green)!important;color:var(--green)}
.toast-e{border-color:var(--red)!important;color:var(--red)}
.toast-i{border-color:var(--blue2)!important;color:var(--blue2)}

/* ══════════ Spinner ══════════ */
.spin{width:30px;height:30px;border:3px solid var(--b1);
  border-top-color:var(--p);border-radius:50%;
  animation:spin .7s linear infinite;margin:28px auto}

/* ══════════ Empty ══════════ */
.empty{text-align:center;padding:40px 16px;color:var(--t2)}
.empty-icon{font-size:40px;margin-bottom:12px}

/* ══════════ Admin Table ══════════ */
.admin-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.admin-card{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);
  padding:18px;text-align:center;cursor:pointer;transition:all .18s}
.admin-card:active{transform:scale(.95);background:var(--card2)}
.admin-icon{font-size:28px;margin-bottom:8px}
.admin-label{font-size:12px;font-weight:700}

/* ══════════ Landing ══════════ */
.land{min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:32px 24px;background:var(--bg);
  position:relative;overflow:hidden}
.land::before{content:'';position:absolute;top:10%;right:-10%;
  width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(124,58,237,.12),transparent)}
.land::after{content:'';position:absolute;bottom:10%;left:-10%;
  width:250px;height:250px;border-radius:50%;
  background:radial-gradient(circle,rgba(37,99,235,.1),transparent)}

/* ══════════ Neon Line ══════════ */
.nline{height:1px;background:linear-gradient(90deg,transparent,var(--p),var(--cyan),transparent);
  margin:14px 0;opacity:.4}

/* ══════════ Status Badge ══════════ */
.sbadge{display:inline-flex;align-items:center;gap:4px;font-size:9px;
  font-weight:700;border-radius:20px;padding:3px 9px;border:1px solid transparent}
.sb-act{background:rgba(16,185,129,.12);color:var(--green);border-color:rgba(16,185,129,.25)}
.sb-exp{background:rgba(239,68,68,.1);color:var(--red);border-color:rgba(239,68,68,.2)}
.sb-ns {background:rgba(245,158,11,.1);color:var(--orange);border-color:rgba(245,158,11,.2)}
.sb-sub{background:rgba(37,99,235,.12);color:var(--blue2);border-color:rgba(37,99,235,.2)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

// ══════════════════════════════════════════════════════════════
//  Config  ← غيّر هذا برابط Render الحقيقي
// ══════════════════════════════════════════════════════════════
const API = window.location.hostname==="localhost"
  ? "http://localhost:8000"
  : "https://YOUR-RENDER-APP.onrender.com";

const SUBJECTS = {
  arabic:   {n:"اللغة العربية",   i:"📖",c:"rgba(52,152,219,.18)"},
  islamic:  {n:"التربية الإسلامية",i:"🕌",c:"rgba(46,204,113,.15)"},
  english:  {n:"اللغة الإنكليزية",i:"🌍",c:"rgba(99,110,114,.18)"},
  math:     {n:"الرياضيات",       i:"📐",c:"rgba(124,58,237,.18)"},
  biology:  {n:"الأحياء",         i:"🧬",c:"rgba(26,188,156,.15)"},
  chemistry:{n:"الكيمياء",        i:"⚗️",c:"rgba(245,158,11,.12)"},
  physics:  {n:"الفيزياء",        i:"⚡",c:"rgba(239,68,68,.12)"},
};
const THRESH=[0,100,300,700,1500,3000,5000,8000,12000,18000,25000];

// ══════════════════════════════════════════════════════════════
//  API Helper
// ══════════════════════════════════════════════════════════════
let _tok = localStorage.getItem("_t")||"";
async function api(path,opts={}){
  const r=await fetch(API+path,{
    ...opts,
    headers:{"Content-Type":"application/json",
              "Authorization":_tok?`Bearer ${_tok}`:"",
              ...(opts.headers||{})},
    body:opts.body?JSON.stringify(opts.body):undefined,
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||`${r.status}`);}
  return r.json();
}

// ══════════════════════════════════════════════════════════════
//  Utils
// ══════════════════════════════════════════════════════════════
function xpInfo(xp){
  const t=THRESH; let l=1;
  for(let i=t.length-1;i>=0;i--){if(xp>=t[i]){l=i+1;break;}}
  if(l>=t.length) return{level:l,pct:100,needed:0,next:t[t.length-1]};
  const c=t[l-1],n=t[l];
  return{level:l,pct:Math.min(100,Math.round((xp-c)/(n-c)*100)),needed:n-xp,next:n,cur:c};
}
const fmtN=n=>n>=1000?(n/1000).toFixed(1)+"K":String(n);
const fmtT=s=>{if(s<=0)return"00:00";const m=Math.floor(s/60),ss=s%60;return`${String(m).padStart(2,"0")}:${String(ss).padStart(2,"0")}`};

// ══════════════════════════════════════════════════════════════
//  Toast Hook
// ══════════════════════════════════════════════════════════════
function useToast(){
  const[t,setT]=useState({msg:"",type:"i",show:false});
  const tm=useRef();
  const show=(msg,type="i")=>{
    setT({msg,type,show:true});
    clearTimeout(tm.current);
    tm.current=setTimeout(()=>setT(p=>({...p,show:false})),2800);
  };
  return[t,show];
}
function Toast({t}){
  return(
    <div className={`toast-wrap ${t.show?"show":""}`}>
      <div className={`toast-box toast-${t.type}`}>{t.msg}</div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
//  Spinner / Skeleton
// ══════════════════════════════════════════════════════════════
const Sp=()=><div className="spin"/>;
const Skel=()=>(
  <div style={{padding:4}}>
    <div className="sk sk-lg" style={{marginBottom:10,borderRadius:12}}/>
    <div className="sk sk-h"/><div className="sk sk-h" style={{width:"70%"}}/>
    <div className="sk sk-h" style={{marginTop:10}}/><div className="sk sk-sm"/>
  </div>
);

// ══════════════════════════════════════════════════════════════
//  Auth — Login / Register
// ══════════════════════════════════════════════════════════════
function AuthPage({onLogin}){
  const[mode,setMode]=useState("login");
  const[form,setForm]=useState({full_name:"",username:"",password:"",school_name:"",class_code:""});
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");
  const set=k=>e=>setForm(p=>({...p,[k]:e.target.value}));

  // تحقق من التوكن المحفوظ
  useEffect(()=>{
    const t=localStorage.getItem("_t");
    if(!t)return;
    _tok=t;
    api("/auth/me").then(data=>{
      const u=localStorage.getItem("_u");
      onLogin(u?JSON.parse(u):{user_id:data.id,role:data.role,full_name:data.full_name});
    }).catch(()=>{localStorage.removeItem("_t");localStorage.removeItem("_u");});
  },[]);

  const submit=async()=>{
    setLoading(true);setErr("");
    try{
      const path=mode==="login"?"/auth/login":"/auth/register";
      const body=mode==="login"
        ?{username:form.username,password:form.password}
        :{full_name:form.full_name,username:form.username,password:form.password,
          school_name:form.school_name,class_code:form.class_code};
      const d=await api(path,{method:"POST",body});
      _tok=d.token;
      localStorage.setItem("_t",_tok);
      localStorage.setItem("_u",JSON.stringify({user_id:d.user_id,role:d.role,full_name:d.full_name}));
      onLogin(d);
    }catch(e){setErr(e.message);}
    setLoading(false);
  };

  return(
    <div className="land">
      <div style={{textAlign:"center",marginBottom:32,position:"relative",zIndex:1}}>
        <div style={{fontSize:60,marginBottom:16,animation:"float 3s ease-in-out infinite"}}>🎓</div>
        <div style={{fontSize:24,fontWeight:900}} className="neon-title">منصة السادس التعليمية</div>
        <div style={{fontSize:12,color:"var(--t2)",marginTop:8}}>المنصة الأولى للطلاب في العراق</div>
      </div>

      <div style={{width:"100%",maxWidth:380,position:"relative",zIndex:1}}>
        <div className="card" style={{background:"rgba(13,17,23,.9)"}}>
          <div style={{display:"flex",gap:8,marginBottom:20}}>
            {["login","register"].map(m=>(
              <button key={m} className={`btn ${mode===m?"btn-p":"btn-outline"}`}
                      style={{flex:1,padding:9}} onClick={()=>setMode(m)}>
                {m==="login"?"🔑 دخول":"✨ تسجيل"}
              </button>
            ))}
          </div>

          {mode==="register"&&(
            <>
              <div className="form-group">

// ══════════════════════════════════════════════════════════════
//  Exam Card with live timer
// ══════════════════════════════════════════════════════════════
function ExamCard({exam,toast,onRefresh}){
  const[status,setStatus]=useState(exam.my_status||"not_started");
  const[rem,setRem]=useState(exam.remaining||0);
  const[loading,setLoading]=useState(false);
  const ti=useRef();
  const subj=SUBJECTS[exam.subject_key]||{n:exam.subject_key,i:"📝"};

  useEffect(()=>{
    if(status!=="started"||rem<=0)return;
    ti.current=setInterval(()=>{
      setRem(p=>{
        if(p<=1){clearInterval(ti.current);setStatus("expired");return 0;}
        return p-1;
      });
    },1000);
    return()=>clearInterval(ti.current);
  },[status]);

  const start=async()=>{
    setLoading(true);
    try{
      const d=await api(`/api/exams/${exam.id}/start`,{method:"POST"});
      if(d.status==="submitted"){toast("لقد سلّمت هذا الامتحان مسبقاً","i");setStatus("submitted");return;}
      if(d.status==="expired"){toast("انتهى وقت الامتحان","e");setStatus("expired");return;}
      setStatus("started");setRem(d.remaining||exam.duration_minutes*60);
      toast("✅ بدأ الامتحان! الوقت يسير…","s");
    }catch(e){toast(e.message,"e");}
    setLoading(false);
  };

  const submit=async()=>{
    if(rem<=0){toast("انتهى الوقت!","e");return;}
    setLoading(true);
    try{
      await api("/api/exams/submit",{method:"POST",body:{exam_id:exam.id,answer_text:"تم التسليم"}});
      setStatus("submitted");clearInterval(ti.current);
      toast("✅ تم التسليم! +30 XP 🎉","s");
    }catch(e){toast(e.message,"e");}
    setLoading(false);
  };

  const total=exam.duration_minutes*60;
  const pct=total>0?Math.round((rem/total)*100):0;
  const warn=rem<60?"crit":rem<total*.25?"warn":"ok";

  return(
    <div className={`exam-card ${status==="started"?"active-exam":""}`}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
        <div style={{flex:1,marginLeft:8}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:3}}>{exam.title}</div>
          <div style={{fontSize:10,color:"var(--t2)"}}>{exam.description}</div>
        </div>
        <span className={`sbadge ${status==="not_started"?"sb-ns":status==="started"?"sb-act":status==="submitted"?"sb-sub":"sb-exp"}`}>
          {status==="not_started"?"⏳ لم يبدأ":status==="started"?"🔴 جارٍ":status==="submitted"?"✅ مسلَّم":"❌ منتهي"}
        </span>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
        {[`⏱️ ${exam.duration_minutes} دقيقة`,`${subj.i} ${subj.n}`].map(t=>(
          <span key={t} style={{background:"var(--s2)",border:"1px solid var(--b1)",
            borderRadius:6,padding:"2px 8px",fontSize:10}}>{t}</span>
        ))}
      </div>
      {status==="started"&&(
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <div style={{flex:1}}>
            <div className="prog" style={{height:7}}>
              <div className="prog-fill" style={{width:`${pct}%`,
                background:warn==="crit"?"linear-gradient(90deg,var(--red),#c0392b)":
                           warn==="warn"?"linear-gradient(90deg,var(--orange),#e67e22)":undefined}}/>
            </div>
          </div>
          <div className={`timer ${warn}`}>{fmtT(rem)}</div>
        </div>
      )}
      {status==="submitted"&&exam.my_score!=null&&(
        <div style={{background:"rgba(16,185,129,.1)",border:"1px solid rgba(16,185,129,.2)",
             borderRadius:8,padding:"8px 12px",fontSize:12,fontWeight:700,color:"var(--green)"}}>
          📊 درجتك: {exam.my_score?.toFixed(1)}/100
        </div>
      )}
      <div style={{display:"flex",gap:8,marginTop:status==="started"?0:2}}>
        {status==="not_started"&&(
          <button className="btn btn-p" onClick={start} disabled={loading}>
            {loading?<Sp/>:"📝 بدء الامتحان"}
          </button>
        )}
        {status==="started"&&rem>0&&(
          <button className="btn btn-p" onClick={submit} disabled={loading}>
            {loading?<Sp/>:"📤 تسليم الإجابة"}
          </button>
        )}
        {exam.url&&(
          <button className="btn btn-outline btn-sm" style={{flex:1}}
                  onClick={()=>window.open(exam.url,"_blank")}>
            📄 ورقة الامتحان
          </button>
        )}
      </div>
    </div>
  );
}

    }catch(e){toast(e.message,"e");}
    setLoading(false);
  };

  const updRanks=async()=>{
    await api("/api/admin/ranks",{method:"POST"}).catch(()=>{});
    toast("✅ تم تحديث الترتيب","s");
    api("/api/admin/stats").then(setStats).catch(()=>{});
  };

  const SUBJECTS_OPTS=Object.entries(SUBJECTS).map(([k,v])=>(
    <option key={k} value={k}>{v.i} {v.n}</option>
  ));

  if(view==="add_lec") return(
    <div className="as">
      <div className="back" onClick={()=>setView("main")}><span style={{fontSize:19}}>◀️</span><span style={{fontSize:12,color:"var(--t2)",fontWeight:700}}>رجوع</span></div>
      <div style={{fontSize:17,fontWeight:900,marginBottom:14}}>📚 إضافة محاضرة</div>
      <div className="card">
        {[["lec_title","عنوان المحاضرة","نص"],["lec_url","رابط الملف أو الفيديو","نص"],["lec_chapter","اسم الفصل (اختياري)","نص"],["lec_desc","وصف (اختياري)","نص"]].map(([k,label,_])=>(
          <div key={k} className="form-group">
            <label className="form-label">{label}</label>
            <input className="input" value={form[k]||""} onChange={set(k)} placeholder={label}/>
          </div>
        ))}
        <div className="form-group">
          <label className="form-label">المادة</label>
          <select className="input" value={form.lec_subj||""} onChange={set("lec_subj")}>
            <option value="">اختر المادة</option>{SUBJECTS_OPTS}
          </select>
        </div>
        <div className="form-group">
          <label className="form-label">نوع الملف</label>
          <select className="input" value={form.lec_type||"link"} onChange={set("lec_type")}>
            <option value="link">🔗 رابط</option>
            <option value="pdf">📄 PDF</option>
            <option value="video">🎬 فيديو</option>
            <option value="image">🖼️ صورة</option>
          </select>
        </div>
        <button className="btn btn-p" onClick={addLec} disabled={loading}>{loading?<Sp/>:"✅ إضافة المحاضرة"}</button>
      </div>
    </div>
  );

  if(view==="add_exam") return(
    <div className="as">
      <div className="back" onClick={()=>setView("main")}><span style={{fontSize:19}}>◀️</span><span style={{fontSize:12,color:"var(--t2)",fontWeight:700}}>رجوع</span></div>
      <div style={{fontSize:17,fontWeight:900,marginBottom:14}}>📝 إضافة امتحان</div>
      <div className="card">
        {[["ex_title","عنوان الامتحان"],["ex_url","رابط ورقة الامتحان (اختياري)"],["ex_desc","وصف (اختياري)"]].map(([k,label])=>(
          <div key={k} className="form-group">
            <label className="form-label">{label}</label>
            <input className="input" value={form[k]||""} onChange={set(k)} placeholder={label}/>
          </div>
        ))}
        <div className="form-group">
          <label className="form-label">المادة</label>
          <select className="input" value={form.ex_subj||""} onChange={set("ex_subj")}>
            <option value="">اختر المادة</option>{SUBJECTS_OPTS}
          </select>
        </div>
        <div className="form-group">
          <label className="form-label">مدة الامتحان (دقيقة)</label>
          <input className="input" type="number" value={form.ex_dur||60} onChange={set("ex_dur")} min={5} max={300}/>
        </div>
        <button className="btn btn-p" onClick={addExam} disabled={loading}>{loading?<Sp/>:"✅ نشر الامتحان"}</button>
      </div>
    </div>
  );

  if(view==="broadcast") return(
    <div className="as">
      <div className="back" onClick={()=>setView("main")}><span style={{fontSize:19}}>◀️</span><span style={{fontSize:12,color:"var(--t2)",fontWeight:700}}>رجوع</span></div>
      <div style={{fontSize:17,fontWeight:900,marginBottom:14}}>📢 بث جماعي</div>
      <div className="card">
        <div className="form-group"><label className="form-label">عنوان الإشعار</label>
          <input className="input" value={form.bc_title||""} onChange={set("bc_title")} placeholder="مثال: إعلان مهم"/>
        </div>
        <div className="form-group"><label className="form-label">الرسالة</label>
          <textarea className="input" value={form.bc_msg||""} onChange={set("bc_msg")} placeholder="اكتب رسالتك هنا…"/>
        </div>
        <button className="btn btn-p" onClick={broadcast} disabled={loading}>{loading?<Sp/>:"📢 إرسال للجميع"}</button>
      </div>
    </div>
  );

  if(view==="users") return(
    <div className="as">
      <div className="back" onClick={()=>setView("main")}><span style={{fontSize:19}}>◀️</span><span style={{fontSize:12,color:"var(--t2)",fontWeight:700}}>رجوع</span></div>
      <div style={{fontSize:17,fontWeight:900,marginBottom:14}}>👥 الطلاب ({users?.length||0})</div>
      {(users||[]).map(u=>(
        <div key={u.id} className="ci" style={{cursor:"default"}}>
          <div className="ci-ico" style={{background:"var(--s2)",fontSize:22}}>{u.badge||"🥉"}</div>
          <div className="ci-body">
            <div className="ci-title">{u.full_name}</div>
            <div className="ci-sub">LVL {u.level||1} | {(u.xp||0).toLocaleString("ar")} XP | {u.school_name||"—"}</div>
          </div>
          <span style={{fontSize:10,color:"var(--t2)"}}>{u.username}</span>
        </div>
      ))}
    </div>
  );

  return(
    <div className="au">
      <div style={{fontSize:19,fontWeight:900,marginBottom:14}}>
        ⚙️ <span className="neon-title">لوحة الإدارة</span>
      </div>
      {stats&&(
        <div className="stats3" style={{gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:14}}>
          {[["👥",stats.students,"طالب"],["📚",stats.lectures,"محاضرة"],["📝",stats.exams,"امتحان"],["✅",stats.submissions,"إجابة"]].map(([i,v,k])=>(
            <div key={k} className="stat"><div className="stat-v">{v}</div><div className="stat-k">{i} {k}</div></div>
          ))}
        </div>
      )}
      <div className="admin-grid">
        {[
          {i:"📚",n:"إضافة محاضرة",a:()=>setView("add_lec")},
          {i:"📝",n:"إضافة امتحان",a:()=>setView("add_exam")},
          {i:"👥",n:"الطلاب",a:loadUsers},
          {i:"📢",n:"بث جماعي",a:()=>setView("broadcast")},
          {i:"🏆",n:"تحديث الترتيب",a:updRanks},
        ].map(({i,n,a})=>(
          <div key={n} className="admin-card" onClick={a}>
            <div className="admin-icon">{i}</div>
            <div className="admin-label">{n}</div>
          </div>
        ))}
      </div>
      {stats?.top?.length>0&&(
        <>
          <div className="sec">أوائل الطلاب</div>
          {stats.top.map((s,i)=>(
            <div key={i} className="ci" style={{cursor:"default"}}>
              <div className="ci-ico" style={{fontSize:20}}>{["🥇","🥈","🥉","4.","5."][i]}</div>
              <div className="ci-body">
                <div className="ci-title">{s.full_name}</div>
                <div className="ci-sub">LVL {s.level} | {(s.xp||0).toLocaleString("ar")} XP</div>
              </div>
              <span style={{fontSize:20}}>{s.badge}</span>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
//  Main App
// ══════════════════════════════════════════════════════════════
function App(){
  const[user,setUser]=useState(null);
  const[profile,setProfile]=useState(null);
  const[page,setPage]=useState("home");
  const[hist,setHist]=useState([]);
  const[notifCount,setNC]=useState(0);
  const[t,showToast]=useToast();

  const login=async(data)=>{
    setUser(data);
    try{
      const p=await api("/api/profile");
      setProfile(p);
      api("/api/notifications").then(d=>setNC(d.unread||0)).catch(()=>{});
    }catch(e){}
  };

  const logout=()=>{
    localStorage.removeItem("_t");localStorage.removeItem("_u");
    _tok="";setUser(null);setProfile(null);setPage("home");
  };

  const goPage=(name,push=true)=>{
    if(push&&page!==name) setHist(h=>[...h,page]);
    setPage(name);
    if(name==="notifs") setNC(0);
  };

  const refreshProfile=async()=>{
    try{const p=await api("/api/profile");setProfile(p);}catch(e){}
  };

  // Auto-refresh profile every 2 min
  useEffect(()=>{
    if(!user)return;
    const iv=setInterval(()=>{
      api("/api/profile").then(setProfile).catch(()=>{});
      api("/api/notifications").then(d=>setNC(d.unread||0)).catch(()=>{});
    },120000);
    return()=>clearInterval(iv);
  },[user]);

  if(!user) return<><Toast t={t}/><AuthPage onLogin={login}/></>;

  const isAdmin=user.role==="admin"||user.role==="teacher";

  const navItems=[
    {id:"home",i:"🏠",l:"الرئيسية"},
    {id:"lectures",i:"📚",l:"المحاضرات"},
    {id:"exams",i:"📝",l:"الامتحانات"},
    {id:"leaderboard",i:"🏆",l:"الأوائل"},
    isAdmin?{id:"admin",i:"⚙️",l:"الإدارة"}:{id:"profile",i:"👤",l:"ملفي"},
  ];

  const pages={
    home:<HomePage profile={profile} goPage={goPage}/>,
    lectures:<LecturesPage toast={showToast}/>,
    exams:<ExamsPage toast={showToast}/>,
    leaderboard:<LeaderboardPage toast={showToast}/>,
    profile:<ProfilePage profile={profile} toast={showToast} onRefresh={refreshProfile} onLogout={logout}/>,
    notifs:<NotifsPage toast={showToast}/>,
    admin:<AdminPage toast={showToast}/>,
  };

  return(
    <div id="root" style={{height:"100vh",display:"flex",flexDirection:"column"}}>
      <Toast t={t}/>
      <div className="pages">
        <div style={{position:"absolute",inset:0,overflowY:"auto",padding:"16px 16px 76px"}}>
          {pages[page]||pages.home}
        </div>
      </div>
      <nav className="nav">
        {navItems.map(({id,i,l})=>(
          <div key={id} className={`nav-item ${page===id?"active":""}`}
               onClick={()=>goPage(id,false)} style={{position:"relative"}}>
            <span className="nav-icon">{i}</span>
            <span className="nav-label">{l}</span>
            {id==="notifs"&&notifCount>0&&<div className="nb"/>}
          </div>
        ))}
        <div className={`nav-item ${page==="notifs"?"active":""}`}
             onClick={()=>goPage("notifs",false)} style={{position:"relative"}}>
          <span className="nav-icon">🔔</span>
          <span className="nav-label">إشعارات</span>
          {notifCount>0&&<div className="nb"/>}
        </div>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
// PWA Service Worker
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("/sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>
